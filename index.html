      AppsFlyer의 SRI(Sub-Resource Integrity) 공식 공지가 오면 아래 두 단계로 적용합니다.

      Step 1. "latest" URL을 AppsFlyer가 제공하는 버전 고정 URL로 교체합니다.

      Step 2. 아래 script 태그에 두 속성을 추가합니다.
              integrity="sha384-<AppsFlyer가 제공하는 hash값>"
              crossorigin="anonymous"

      적용 후 최종 형태 예시:
      <script
        src="https://onelinksmartscript.appsflyer.com/onelink-smart-script-2.x.x.js"
        integrity="sha384-AAABBBCCC..."
        crossorigin="anonymous"
      ></script>

      주의: integrity hash는 절대 직접 계산하지 말고 AppsFlyer 공식 공지에서 제공하는 값을 사용합니다.
    -->
